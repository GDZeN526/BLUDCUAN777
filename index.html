<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLUDCUAN777</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:"Comic Sans MS","Impact",cursive;
filter: blur(1px) contrast(1.2);
image-rendering: pixelated;
color:white;
text-align:center;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter: blur(6px) contrast(1.4) brightness(0.8);
}

#bg2{display:none;}

.vhs{
position:fixed;
width:100%;
height:100%;
background:
repeating-linear-gradient(
0deg,
rgba(255,255,255,0.03) 0px,
rgba(0,0,0,0.3) 2px
);
pointer-events:none;
z-index:10;
animation:shake 0.15s infinite;
}

@keyframes shake{
0%{transform:translate(0,0)}
25%{transform:translate(-1px,1px)}
50%{transform:translate(1px,-1px)}
75%{transform:translate(-1px,0)}
100%{transform:translate(1px,1px)}
}

.title{
font-size:50px;
color:red;
margin-top:20px;
transform:scaleY(2);
text-shadow:3px 3px 0 black,-3px -3px 0 black,0 0 15px red;
}

.slotbox{
display:flex;
justify-content:center;
align-items:center;
height:55vh;
gap:10px;
}

.slotbox img{
width:200px;
height:200px;
image-rendering:pixelated;
border:8px ridge gray;
filter:contrast(1.5) blur(1px);
}

/* BUTTON AREA */

.buttonArea{
position:relative;
width:300px;
margin:auto;
}

/* WIN / LOSE text */

.result{
position:center;
top:50%;
left:50%;
transform:translate(-50%,-50%) scaleY(2);
font-size:80px;
pointer-events:none;
z-index:5;
text-shadow:
5px 5px black,
-5px -5px black,
0 0 15px red;
}

/* SPIN BUTTON */

button{
width:100%;
font-size:30px;
padding:20px;
background:red;
color:white;
border:5px outset white;
cursor:pointer;
transform:scaleY(1.5);
}

button:active{
border:5px inset white;
}

</style>
</head>

<body>

<div class="vhs"></div>

<video id="bg1" autoplay muted loop>
<source src="BG.mp4">
</video>

<video id="bg2" autoplay muted loop>
<source src="BG2.mp4">
</video>

<audio id="bgm" src="BGM.mp3" loop></audio>
<audio id="bgm2" src="BGM2.mp3"></audio>

<h1 class="title">BLUDCUAN777</h1>

<div class="slotbox">
<img id="slot1" src="Slot1.png">
<img id="slot2" src="Slot2.png">
<img id="slot3" src="Slot3.png">
</div>

<div class="buttonArea">

<div class="result" id="resultText"></div>

<button id="spinButton" onclick="spin()">SPIN</button>

</div>

<script>

let slots=[
document.getElementById("slot1"),
document.getElementById("slot2"),
document.getElementById("slot3")
]

let resultText=document.getElementById("resultText")
let spinButton=document.getElementById("spinButton")

let bgm=document.getElementById("bgm")
let bgm2=document.getElementById("bgm2")

let bg1=document.getElementById("bg1")
let bg2=document.getElementById("bg2")

document.body.onclick=function(){
bgm.play()
}

function spin(){

resultText.innerText=""

let frames=["Slot1.png","Slot2.png","Slot3.png","Slot4.png"]

let spins=20
let i=0

let interval=setInterval(function(){

slots.forEach(s=>{
s.src=frames[Math.floor(Math.random()*frames.length)]
})

i++

if(i>=spins){
clearInterval(interval)
result()
}

},120)

}

function result(){

let chance=Math.random()

/* Secret Slot5 event */

if(chance<0.08){

slots[0].src="Slot5.png"
slots[1].src="Slot5.png"
slots[2].src="Slot5.png"

triggerWin()
return
}

let frames=["Slot1.png","Slot2.png","Slot3.png","Slot4.png"]

let results=[]

slots.forEach((s)=>{
let img=frames[Math.floor(Math.random()*frames.length)]
s.src=img
results.push(img)
})

if(results[0]===results[1] && results[1]===results[2]){
resultText.innerText="WIN"
}else{
resultText.innerText="LOSE"
}

}

function triggerWin(){

spinButton.style.display="none"

document.body.style.filter="grayscale(1) contrast(3)"

bg1.style.display="none"
bg2.style.display="block"

bgm.pause()
bgm2.play()

setTimeout(function(){

document.body.style.background="black"
document.body.style.filter="none"

bg1.style.display="block"
bg2.style.display="none"

bgm2.pause()
bgm2.currentTime=0
bgm.currentTime=0
bgm.play()

spinButton.style.display="block"

resultText.innerText=""

},15000)

}

</script>

</body>
</html>
